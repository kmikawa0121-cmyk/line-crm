<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>美川漢方堂 マイページ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f5f5f0;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #3d6b4f;
      color: white;
      padding: 20px 16px 16px;
      text-align: center;
    }
    header h1 {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0.05em;
    }
    header p {
      font-size: 13px;
      margin-top: 4px;
      opacity: 0.85;
    }

    #loading {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: 14px;
    }

    #error-msg {
      text-align: center;
      padding: 60px 20px;
      color: #c0392b;
      font-size: 14px;
      display: none;
    }

    #main { display: none; padding: 16px; }

    /* ポイントカード */
    .point-card {
      background: white;
      border-radius: 12px;
      padding: 24px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 16px;
    }
    .point-card .label {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }
    .point-card .point-value {
      font-size: 42px;
      font-weight: bold;
      color: #3d6b4f;
      line-height: 1;
    }
    .point-card .point-unit {
      font-size: 16px;
      color: #3d6b4f;
      margin-left: 4px;
    }
    .point-card .user-name {
      font-size: 14px;
      color: #555;
      margin-top: 10px;
    }

    /* セクション */
    .section {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 14px;
      font-weight: bold;
      color: #3d6b4f;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e8ede9;
    }

    /* 購入履歴 */
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: #888; font-size: 13px; }
    .history-total { font-weight: bold; color: #333; }

    .no-history {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      padding: 16px 0;
    }

    /* ボタン */
    .btn-shop {
      display: block;
      width: 100%;
      padding: 16px;
      background: #3d6b4f;
      color: white;
      text-align: center;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(61,107,79,0.3);
      margin-bottom: 16px;
    }
    .btn-shop:active { opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <h1>美川漢方堂</h1>
  <p>マイページ</p>
</header>

<div id="loading">読み込み中...</div>
<div id="error-msg">会員情報が見つかりませんでした。<br>LINEトーク画面から会員番号をご入力ください。</div>

<div id="main">
  <div class="point-card">
    <div class="label">現在のポイント</div>
    <div>
      <span class="point-value" id="point-value">0</span>
      <span class="point-unit">pt</span>
    </div>
    <div class="user-name" id="user-name"></div>
  </div>

  <div class="section">
    <div class="section-title">購入履歴（直近10件）</div>
    <div id="history-list"><div class="no-history">履歴を読み込み中...</div></div>
  </div>

  <a href="https://cocopery.com/mypage/login" class="btn-shop" target="_blank">
    オンラインショップへ →
  </a>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  const LIFF_ID = '__LIFF_ID__'; // Railway環境変数 LIFF_ID から自動置換

  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const profile = await liff.getProfile();
      const lineUserId = profile.userId;

      // ポイント取得
      const memberRes = await fetch(`/api/liff/member?lineUserId=${lineUserId}`);
      if (!memberRes.ok) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-msg').style.display = 'block';
        return;
      }
      const member = await memberRes.json();
      document.getElementById('point-value').textContent = member.point.toLocaleString();
      document.getElementById('user-name').textContent = member.displayName + ' 様';

      // 購入履歴取得
      const historyRes = await fetch(`/api/liff/history?lineUserId=${lineUserId}`);
      const historyData = await historyRes.json();
      renderHistory(historyData.history);

      document.getElementById('loading').style.display = 'none';
      document.getElementById('main').style.display = 'block';

    } catch (err) {
      console.error(err);
      document.getElementById('loading').textContent = 'エラーが発生しました。';
    }
  }

  function renderHistory(history) {
    const list = document.getElementById('history-list');
    if (!history || history.length === 0) {
      list.innerHTML = '<div class="no-history">購入履歴がありません</div>';
      return;
    }
    list.innerHTML = history.map(item => `
      <div class="history-item">
        <span class="history-date">${item.date}</span>
        <span class="history-total">¥${Number(item.total).toLocaleString()}</span>
      </div>
    `).join('');
  }

  init();
</script>
</body>
</html>
