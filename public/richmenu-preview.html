<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 2500px;
    height: 1686px;
    background: #f2ede6;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 18px;
    padding: 18px;
    font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  }
  .btn {
    background: white;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 2px;
    background: #c8960c;
    border-radius: 2px;
    margin-bottom: 30px;
  }
  .btn svg {
    width: 160px;
    height: 160px;
  }
  .btn span {
    font-family: 'Noto Serif JP', serif;
    font-size: 58px;
    color: #2c2c2c;
    font-weight: 400;
    letter-spacing: 0.08em;
    padding-bottom: 50px;
    text-align: center;
    line-height: 1.4;
  }
  .btn span small {
    font-size: 36px;
    color: #888;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<!-- マイページ -->
<div class="btn">
  <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="32" r="18" stroke="#2c2c2c" stroke-width="5"/>
    <path d="M12 88c0-21 17-35 38-35s38 14 38 35" stroke="#2c2c2c" stroke-width="5" stroke-linecap="round"/>
  </svg>
  <span>マイページ<br><small>（会員証）</small></span>
</div>

<!-- オススメ商品 -->
<div class="btn">
  <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 35 L50 15 L80 35 L80 85 L20 85 Z" stroke="#2c2c2c" stroke-width="5" stroke-linejoin="round"/>
    <rect x="36" y="55" width="28" height="30" rx="2" stroke="#2c2c2c" stroke-width="4.5"/>
    <path d="M38 35 C38 27 62 27 62 35" stroke="#2c2c2c" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="35" y1="48" x2="65" y2="48" stroke="#c8960c" stroke-width="3" stroke-linecap="round"/>
  </svg>
  <span>オススメ商品</span>
</div>

<!-- お問い合わせ -->
<div class="btn">
  <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="20" width="80" height="60" rx="6" stroke="#2c2c2c" stroke-width="5"/>
    <polyline points="10,20 50,56 90,20" stroke="#2c2c2c" stroke-width="5" stroke-linejoin="round"/>
    <line x1="10" y1="80" x2="35" y2="55" stroke="#2c2c2c" stroke-width="4" stroke-linecap="round"/>
    <line x1="90" y1="80" x2="65" y2="55" stroke="#2c2c2c" stroke-width="4" stroke-linecap="round"/>
  </svg>
  <span>お問い合わせ</span>
</div>

<!-- ホームページ -->
<div class="btn">
  <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="36" stroke="#2c2c2c" stroke-width="5"/>
    <ellipse cx="50" cy="50" rx="16" ry="36" stroke="#2c2c2c" stroke-width="4"/>
    <line x1="14" y1="50" x2="86" y2="50" stroke="#2c2c2c" stroke-width="4"/>
    <path d="M20 28 Q50 38 80 28" stroke="#c8960c" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M20 72 Q50 62 80 72" stroke="#c8960c" stroke-width="3" fill="none" stroke-linecap="round"/>
  </svg>
  <span>ホームページ</span>
</div>

<!-- 公式SNS -->
<div class="btn">
  <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="25" y="12" width="50" height="76" rx="10" stroke="#2c2c2c" stroke-width="5"/>
    <line x1="25" y1="28" x2="75" y2="28" stroke="#2c2c2c" stroke-width="4"/>
    <line x1="25" y1="74" x2="75" y2="74" stroke="#2c2c2c" stroke-width="4"/>
    <circle cx="50" cy="83" r="4" fill="#2c2c2c"/>
    <rect x="35" y="38" width="30" height="24" rx="4" stroke="#c8960c" stroke-width="3.5"/>
    <line x1="35" y1="46" x2="65" y2="46" stroke="#c8960c" stroke-width="3" stroke-linecap="round"/>
    <line x1="35" y1="53" x2="55" y2="53" stroke="#c8960c" stroke-width="3" stroke-linecap="round"/>
  </svg>
  <span>公式SNS</span>
</div>

<!-- 交通アクセス -->
<div class="btn">
  <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 12C35 12 23 24 23 39C23 60 50 88 50 88C50 88 77 60 77 39C77 24 65 12 50 12Z" stroke="#2c2c2c" stroke-width="5"/>
    <circle cx="50" cy="39" r="12" stroke="#2c2c2c" stroke-width="4.5"/>
    <circle cx="50" cy="39" r="4" fill="#c8960c"/>
  </svg>
  <span>交通アクセス</span>
</div>

</body>
</html>
